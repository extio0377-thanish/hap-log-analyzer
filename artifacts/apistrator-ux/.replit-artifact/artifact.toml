kind = "web"
previewPath = "/"
title = "Extio APISTRATOR"
version = "1.0.0"
id = "artifacts/haproxy-analyzer"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18118

[services.development]
run = "pnpm --filter @workspace/apistrator-ux run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/apistrator-ux", "run", "build" ]
publicDir = "artifacts/apistrator-ux/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18118"
BASE_PATH = "/"
